<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  
  <title>Login</title>

  <link rel="stylesheet" href="./css/style.css">
</head>


<body>

<div class="titulo">
  <h1>Sistema de Agendamento de Barbeiros</h1>

  <div class="form-box">

    <h1>Login</h1>

    <input
      type="text"
      id="usuario"
      placeholder="Usuário"
    >

    <input
      type="password"
      id="senha"
      placeholder="Senha"
    >

    <button onclick="login()">
      Entrar
    </button>

    <div class="link">
      <a href="cadastrar.html">
        Não possuo uma conta
      </a>
    </div>
    <div class="link">
      <a href="cadastrar.html">
        Esqueci a Senha
      </a>
    </div>

  </div>

</div>

<script src="./js/api.js"></script>
<script src="./js/login.js"></script>

</body>
</html>
